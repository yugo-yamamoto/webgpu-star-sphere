<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Star Sphere</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; }
    #msg {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font: 18px/1.8 sans-serif; text-align: center;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="msg">WebGPU がサポートされていません。<br>Chrome 113+ または Edge 113+ をご利用ください。</div>
<script>
(async () => {
  const msg    = document.getElementById('msg');
  const canvas = document.getElementById('c');

  if (!navigator.gpu) { canvas.remove(); msg.style.display = 'block'; return; }

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter)  { canvas.remove(); msg.style.display = 'block'; return; }

  const device  = await adapter.requestDevice();
  const context = canvas.getContext('webgpu');
  const format  = navigator.gpu.getPreferredCanvasFormat();

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    context.configure({ device, format, alphaMode: 'opaque' });
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── Particles ────────────────────────────────────────────────────── */
  const N = 1500;
  const pdata = new Float32Array(N * 4); // vec4: xyz = position, w = pixel radius

  for (let i = 0; i < N; i++) {
    let x, y, z;
    if (i < N * 0.65) {
      // Uniform fill inside the sphere (rejection sampling)
      do {
        x = Math.random() * 2 - 1;
        y = Math.random() * 2 - 1;
        z = Math.random() * 2 - 1;
      } while (x*x + y*y + z*z > 1.0);
    } else {
      // Near-surface shell – defines the sphere boundary
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const r     = 0.90 + Math.random() * 0.10;
      x = r * Math.sin(phi) * Math.cos(theta);
      y = r * Math.sin(phi) * Math.sin(theta);
      z = r * Math.cos(phi);
    }
    pdata[i*4]   = x;
    pdata[i*4+1] = y;
    pdata[i*4+2] = z;
    pdata[i*4+3] = 1.5 + Math.random() * 3.0; // pixel radius: 1.5 – 4.5
  }

  const pBuf = device.createBuffer({
    size: pdata.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
  });
  device.queue.writeBuffer(pBuf, 0, pdata);

  /* ── Uniform buffer: mat4 (64 B) + vec2 screen (8 B) + pad (8 B) = 80 B ── */
  const uBuf = device.createBuffer({
    size: 80,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  /* ── Shaders ──────────────────────────────────────────────────────── */
  const shader = device.createShaderModule({ code: /* wgsl */`
struct Uniforms {
    mvp    : mat4x4<f32>,   // bytes  0–63
    screen : vec2<f32>,     // bytes 64–71
    pad    : vec2<f32>,     // bytes 72–79
}

@group(0) @binding(0) var<uniform>          uni   : Uniforms;
@group(0) @binding(1) var<storage, read> particles : array<vec4<f32>>;

struct VOut {
    @builtin(position) pos : vec4<f32>,
    @location(0)       uv  : vec2<f32>,
    @location(1)       br  : f32,        // normalised brightness [0,1]
}

@vertex
fn vs(
    @builtin(vertex_index)   vi : u32,
    @builtin(instance_index) ii : u32,
) -> VOut {
    let p    = particles[ii];
    let size = p.w;                        // particle pixel radius

    // Two triangles forming a unit quad in [-1,1]
    let quad = array<vec2<f32>, 6>(
        vec2(-1.0, -1.0), vec2( 1.0, -1.0), vec2(-1.0,  1.0),
        vec2(-1.0,  1.0), vec2( 1.0, -1.0), vec2( 1.0,  1.0),
    );
    let uv = quad[vi];

    // Orthographic transform (w stays 1 — no perspective divide needed)
    let clip   = uni.mvp * vec4<f32>(p.xyz, 1.0);
    // Billboard: add screen-space pixel offset converted to clip-space
    let offset = uv * (size * 2.0) / uni.screen;

    var o : VOut;
    o.pos = vec4<f32>(clip.xy + offset, 0.5, 1.0);
    o.uv  = uv;
    o.br  = size / 4.5;
    return o;
}

@fragment
fn fs(in: VOut) -> @location(0) vec4<f32> {
    let d = length(in.uv);
    if d > 1.0 { discard; }

    // Soft glow + bright core
    let core = smoothstep(0.35, 0.0, d);
    let glow = exp(-d * d * 2.8);

    let orange = vec3<f32>(1.00, 0.42, 0.02);
    let white  = vec3<f32>(1.00, 0.90, 0.78);
    let col    = mix(orange, white, core * 0.75);

    let a = (glow * 0.55 + core * 0.45) * clamp(in.br * 0.8 + 0.3, 0.3, 1.0);
    return vec4<f32>(col, a);
}
`});

  /* ── Bind group & pipeline ────────────────────────────────────────── */
  const bgl = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform'           } },
    { binding: 1, visibility: GPUShaderStage.VERTEX, buffer: { type: 'read-only-storage' } },
  ]});

  const bg = device.createBindGroup({ layout: bgl, entries: [
    { binding: 0, resource: { buffer: uBuf } },
    { binding: 1, resource: { buffer: pBuf } },
  ]});

  const pipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
    vertex:   { module: shader, entryPoint: 'vs' },
    fragment: {
      module: shader, entryPoint: 'fs',
      targets: [{
        format,
        blend: {
          // Additive blending → overlapping glows accumulate naturally
          color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
          alpha: { srcFactor: 'one',       dstFactor: 'one', operation: 'add' },
        },
      }],
    },
    primitive: { topology: 'triangle-list' },
  });

  /* ── Render loop ──────────────────────────────────────────────────── */
  const u = new Float32Array(20); // 16 (mat4) + 2 (screen) + 2 (pad)
  let angle = 0;

  function frame() {
    angle += 0.0008; // slow Y-axis rotation

    const W = canvas.width, H = canvas.height;
    const aspect = W / H;

    // Scale so sphere fills the shorter axis (appears circular, maximally large)
    const sx = 0.88 * Math.min(1.0, 1.0 / aspect);
    const sy = 0.88 * Math.min(1.0, aspect);
    const sz = 0.88;

    const c = Math.cos(angle), s = Math.sin(angle);

    // Column-major S·Ry matrix written into Float32Array
    //   Row-major form:
    //   [ sx·cos   0   sx·sin   0 ]
    //   [   0      sy    0      0 ]
    //   [-sz·sin   0   sz·cos   0 ]
    //   [   0      0     0      1 ]
    u[ 0] = sx*c;  u[ 1] = 0;   u[ 2] = -sz*s; u[ 3] = 0;  // col 0
    u[ 4] = 0;     u[ 5] = sy;  u[ 6] = 0;     u[ 7] = 0;  // col 1
    u[ 8] = sx*s;  u[ 9] = 0;   u[10] =  sz*c; u[11] = 0;  // col 2
    u[12] = 0;     u[13] = 0;   u[14] = 0;     u[15] = 1;  // col 3
    u[16] = W;     u[17] = H;                               // screen size

    device.queue.writeBuffer(uBuf, 0, u);

    const enc  = device.createCommandEncoder();
    const pass = enc.beginRenderPass({
      colorAttachments: [{
        view:       context.getCurrentTexture().createView(),
        clearValue: { r: 0, g: 0, b: 0, a: 1 },
        loadOp:  'clear',
        storeOp: 'store',
      }],
    });
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bg);
    pass.draw(6, N); // 6 vertices × N instances
    pass.end();
    device.queue.submit([enc.finish()]);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);


})().catch(err => {
  document.getElementById('c').remove();
  const m = document.getElementById('msg');
  m.style.display = 'block';
  m.innerHTML = 'エラーが発生しました：<br><code>' + err.message + '</code>';
});
</script>
</body>
</html>
